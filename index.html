<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="galleryOverLay"></div>
    <div class="imageBox">
      <span class="close">&times;</span>
      <span class="prev">&#10094;</span>
      <span class="next">&#10095;</span>
      <img src="" alt="" />
    </div>
    <div id="gallery">
      <h1>My Image gallery</h1>
      <!-- Images -->
      <div class="images">
        <img src="./images/food/food.jpg" alt="Food" class="img" />
        <img src="./images/food/burger.jpg" alt="Food" class="img" />
        <img src="./images/animals/animal.jpg" alt="Animal" class="img" />
        <img src="./images/animals/panda.webp" alt="Animal" class="img" />
        <img src="./images/flowers/flower.jpg" alt="Flower" class="img" />
        <img src="./images/flowers/lily.jpg" alt="Flower" class="img" />
        <img src="./images/places/place.jpg" alt="Famous Place" class="img" />
        <img src="./images/places/1.jpg" alt="Famous Place" class="img" />
        <img src="./images/cars/car.jpg" alt="Car" class="img" />
        <img src="./images/cars/whitecar.jpeg" alt="Car" class="img" />
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
