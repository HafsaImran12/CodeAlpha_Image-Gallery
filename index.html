<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image-Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Image Gallery Section -->

    <div id="gallery">
      <h1 id="heading">My Image gallery</h1>

      <!-- Images -->
      <div class="images">
        <div class="section" id="foodBtn">
          <img src="./images/biryani.jpg" alt="Image1" class="img" />
          <img src="./images/burger.jpg" alt="Image2" class="img" />
          <img src="./images/waffle.jpg" alt="Image3" class="img" />
        </div>
        <div class="section">
          <img src="./images/blue car.jpg" alt="Image4" class="img" />
          <img src="./images/white car.jpeg" alt="Image5" class="img" />
          <img src="./images/orange car.webp" alt="Image6" class="img" />
        </div>
        <div class="section">
          <img src="./images/lion.jpg" alt="Image7" class="img" />
          <img src="./images/zebra.jpg" alt="Image8" class="img" />
          <img src="./images/peacock.jpg" alt="Image9" class="img" />
        </div>
        <div class="section">
          <img src="./images/place.jpg" alt="Image10" class="img" />
          <img src="./images/sea.jpg" alt="Image11" class="img" />
          <img src="./images/water fall.jpg" alt="Image12" class="img" />
        </div>
      </div>
    </div>

    <!-- Light Box Section -->
    <div class="light-box">
      <span class="close">&times;</span>
      <span class="prev">&#10094;</span>
      <img src="..." id="light-box-img" />
      <span class="next">&#10095;</span>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
