<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image-Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="galleryOverLay"></div>
    <div class="imageBox">
      <span class="close">&times;</span>
      <span class="prev">&#10094;</span>
      <span class="next">&#10095;</span>
      <img src="" alt="" />
    </div>
    <div id="gallery">
      <h1>My Image gallery</h1>
      <!-- Images -->
      <div class="images">
        <div class="img">
          <img src="./images/food/biryani.jpg" alt="biryani" />
          <img src="./images/food/food.jpg" alt="food" />
          <img src="./images/food/burger.jpg" alt="burger" />
        </div>
        
        <div class="img">
          <img src="./images/animals/animal.jpg" alt="animal">
          <img src="./images/animals/deer.jpg" alt="deer">
          <img src="./images/animals/zebra.jpg" alt="zebra">
        </div>
        
        <div class="img">
          <img src="./images/cars/car.jpg" alt="car">
          <img src="./images/cars/bluecar.jpg" alt="bluecar">
          <img src="./images/cars/whitecar.jpeg" alt="whitecar">
        </div>

        <div class="img">
          <img src="./images/places/1.jpg" alt="place1">
          <img src="./images/places/2.jpg" alt="place2">
          <img src="./images/places/3.jpg" alt="place3">
        </div>

      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
