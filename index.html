<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="gallery">
      <h1>My Image gallery</h1>
      <div class="btns">
        <button class="button allBtn">All</button>
        <button class="button foodBtn">Food</button>
        <button class="button animalBtn">Animals</button>
        <button class="button flowerBtn">Flowers</button>
        <button class="button placeBtn">Places</button>
        <button class="button carBtn">Cars</button>
      </div>
      <div class="images">
        <img src="./images/food/food.jpg" alt="Food" class="img" />
        <img src="./images/animals/animal.jpg" alt="Animal" class="img" />
        <img src="./images/flowers/flower.jpg" alt="Flower" class="img" />
        <img src="./images/places/place.jpg" alt="Famous Place" class="img" />
        <img src="./images/cars/car.jpg" alt="Car" class="img" />
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
